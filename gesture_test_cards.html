<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Gesture Click Test - 9 Flip Cards</title>
  <style>
    :root {
      color-scheme: dark;
      --bg: #0f1220;
      --card-front: #1f6feb;
      --card-back: #2ea043;
      --text: #e6edf3;
    }
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: radial-gradient(circle at top, #1a1f36, var(--bg));
      color: var(--text);
      min-height: 100vh;
      display: grid;
      place-items: center;
    }
    .wrapper {
      width: min(92vw, 920px);
      text-align: center;
    }
    h1 {
      margin: 0 0 10px;
      font-size: 1.35rem;
      font-weight: 600;
    }
    p {
      margin: 0 0 18px;
      opacity: 0.85;
    }
    .grid {
      display: grid;
      grid-template-columns: repeat(3, minmax(120px, 1fr));
      gap: 14px;
      perspective: 800px;
      margin-bottom: 18px;
    }
    .card {
      position: relative;
      aspect-ratio: 1 / 1;
      border: 0;
      background: transparent;
      cursor: pointer;
      transform-style: preserve-3d;
      transition: transform 260ms ease;
      padding: 0;
    }
    .card:focus-visible {
      outline: 3px solid #58a6ff;
      outline-offset: 2px;
    }
    .card.flipped {
      transform: rotateY(180deg);
    }
    .face {
      position: absolute;
      inset: 0;
      display: grid;
      place-items: center;
      border-radius: 12px;
      font-size: 1.1rem;
      font-weight: 700;
      backface-visibility: hidden;
      user-select: none;
      box-shadow: 0 10px 20px rgba(0, 0, 0, 0.28);
    }
    .front {
      background: linear-gradient(145deg, var(--card-front), #3b82f6);
    }
    .back {
      background: linear-gradient(145deg, var(--card-back), #3fb950);
      transform: rotateY(180deg);
    }
    .dictation-wrap {
      text-align: left;
    }
    .dictation-wrap label {
      display: block;
      font-size: 0.95rem;
      margin-bottom: 8px;
      opacity: 0.9;
    }
    #dictationBox {
      width: 100%;
      min-height: 120px;
      border-radius: 10px;
      border: 1px solid #3d4a6b;
      background: #0b1020;
      color: var(--text);
      padding: 12px;
      font-size: 1rem;
      line-height: 1.35;
      resize: vertical;
      box-sizing: border-box;
    }
    #dictationStatus {
      margin-top: 8px;
      font-size: 0.9rem;
      opacity: 0.9;
      min-height: 1.2em;
    }
  </style>
</head>
<body>
  <main class="wrapper">
    <h1>Gesture Click Test</h1>
    <p>Click any card to flip it. Click again to flip back.</p>
    <section class="grid" id="cardGrid"></section>
    <section class="dictation-wrap">
      <label for="dictationBox">Click in the text box to start dictation</label>
      <textarea id="dictationBox" placeholder="Click here, then speak..."></textarea>
      <div id="dictationStatus">Idle</div>
    </section>
  </main>

  <script>
    const grid = document.getElementById("cardGrid");
    for (let i = 1; i <= 9; i++) {
      const btn = document.createElement("button");
      btn.className = "card";
      btn.type = "button";
      btn.setAttribute("aria-pressed", "false");
      btn.setAttribute("aria-label", `Card ${i}`);
      btn.innerHTML = `
        <span class="face front">Card ${i}</span>
        <span class="face back">Flipped ${i}</span>
      `;
      btn.addEventListener("click", () => {
        const flipped = btn.classList.toggle("flipped");
        btn.setAttribute("aria-pressed", String(flipped));
      });
      grid.appendChild(btn);
    }

    const dictationBox = document.getElementById("dictationBox");
    const dictationStatus = document.getElementById("dictationStatus");
    const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
    let recognizer = null;
    let recognizing = false;

    function setStatus(text) {
      dictationStatus.textContent = text;
    }

    if (!SpeechRecognition) {
      setStatus("Speech recognition not supported in this browser.");
      dictationBox.title = "Use Chrome/Edge for Web Speech API dictation.";
    } else {
      recognizer = new SpeechRecognition();
      recognizer.lang = "en-US";
      recognizer.continuous = true;
      recognizer.interimResults = true;

      recognizer.onstart = () => {
        recognizing = true;
        setStatus("Listening...");
      };

      recognizer.onresult = (event) => {
        let finalText = "";
        let interimText = "";
        for (let i = event.resultIndex; i < event.results.length; i++) {
          const transcript = event.results[i][0].transcript;
          if (event.results[i].isFinal) {
            finalText += transcript + " ";
          } else {
            interimText += transcript;
          }
        }
        if (finalText) {
          dictationBox.value += finalText;
        }
        dictationBox.dataset.interim = interimText;
        setStatus(interimText ? `Listening... ${interimText}` : "Listening...");
      };

      recognizer.onerror = (event) => {
        setStatus(`Mic error: ${event.error}`);
      };

      recognizer.onend = () => {
        recognizing = false;
        delete dictationBox.dataset.interim;
        setStatus("Idle");
      };

      dictationBox.addEventListener("click", () => {
        if (!recognizing) {
          recognizer.start();
        }
      });

      dictationBox.addEventListener("blur", () => {
        if (recognizing) {
          recognizer.stop();
        }
      });
    }
  </script>
</body>
</html>
